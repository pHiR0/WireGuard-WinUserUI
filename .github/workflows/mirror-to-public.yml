name: Mirror → Repo público

# Se dispara cada vez que se hace push a main en el repo privado.
# Sincroniza main del repo privado con el repo público,
# excluyendo automáticamente los archivos privados (ya excluidos de main
# por .gitattributes merge=ours).

on:
  push:
    branches: [main]

jobs:
  mirror:
    name: Sincronizar main con WireGuard-WinUserUI (público)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout completo (con historial)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # necesario para push con historial completo
          persist-credentials: false  # no persistir GITHUB_TOKEN para que no anule el PAT

      - name: Push a repo público
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git remote add public https://pHiR0:${TOKEN}@github.com/pHiR0/WireGuard-WinUserUI.git
          git push public HEAD:main --force

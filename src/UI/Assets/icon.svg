<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#C0392B"/>
  <!-- Inner gradient overlay -->
  <rect width="512" height="512" rx="96" fill="url(#grad)" opacity="0.35"/>
  <defs>
    <radialGradient id="grad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#7B0000"/>
    </radialGradient>
  </defs>

  <!-- WireGuard-inspired mark: stylized shield / tunnel portal in white -->
  <!-- Outer diamond / rhombus shape -->
  <polygon points="256,60 420,180 420,332 256,452 92,332 92,180" fill="none" stroke="white" stroke-width="22" stroke-linejoin="round" opacity="0.95"/>
  <!-- Inner horizontal lines suggesting tunnel layers -->
  <line x1="140" y1="214" x2="372" y2="214" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <line x1="160" y1="258" x2="352" y2="258" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="302" x2="372" y2="302" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.9"/>

  <!-- "UI" badge at bottom-right corner -->
  <rect x="295" y="370" width="178" height="94" rx="18" fill="#1A1A2E" opacity="0.88"/>
  <text x="384" y="437" font-family="'Segoe UI', Arial, sans-serif" font-size="66" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">UI</text>
</svg>
